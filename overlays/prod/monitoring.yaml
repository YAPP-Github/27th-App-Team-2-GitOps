---
# Prometheus ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: prod
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # Prometheus 자체 메트릭
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Spring Boot 애플리케이션 메트릭 (neki-prod)
      - job_name: 'spring-boot'
        metrics_path: '/actuator/prometheus'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - prod
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: neki-prod-service
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: http
          # 파드 이름을 pod 레이블로 추가 (1호기, 2호기 구분용)
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          # instance 레이블을 파드 이름으로 설정 (IP 대신)
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: instance
---
# Prometheus RBAC
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-prod
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - configmaps
    verbs: ["get"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-prod
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: prod
---
# Prometheus Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: prod
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.47.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--web.enable-lifecycle"
          ports:
            - containerPort: 9090
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-storage
              mountPath: /prometheus
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-storage
          emptyDir: {}
---
# Prometheus Service
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: prod
  labels:
    app: prometheus
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: http
  selector:
    app: prometheus
---
# Grafana ConfigMap - Datasource 설정
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: prod
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
        editable: true
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki-service:3100
        editable: true
        jsonData:
          derivedFields:
            - datasourceUid: prometheus
              matcherRegex: "requestId=([a-f0-9]+)"
              name: requestId
              url: ""
---
# Grafana ConfigMap - Dashboard Provider
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: prod
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
# Grafana ConfigMap - Alerting Provisioning (Contact Point + Policy + Rule)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting
  namespace: prod
data:
  # Discord 알림 채널 (웹훅 URL은 DISCORD_WEBHOOK_URL 환경변수에서 주입)
  contactpoints.yaml: |
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: discord-prod
        receivers:
          - uid: discord_prod
            type: discord
            settings:
              url: ${DISCORD_WEBHOOK_URL}
              title: "🚨 [prod] neki-prod ERROR 발생"
              message: |
                {{ range .Alerts }}*{{ .Labels.alertname }}* — {{ .Annotations.summary }}
                pod: `{{ .Labels.pod }}` / level: `{{ .Labels.level }}`
                {{ end }}
  # 모든 알림을 Discord로 라우팅
  policies.yaml: |
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: discord-prod
        group_by: ['alertname', 'pod']
        group_wait: 10s
        group_interval: 1m
        repeat_interval: 30m
  # neki-prod ERROR 로그 1건이라도 발생 시 알림
  rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: neki-prod-error-logs
        folder: neki-prod
        interval: 1m
        rules:
          - uid: neki-prod-error-logs
            title: neki-prod ERROR logs
            condition: C
            for: 0m
            noDataState: OK
            execErrState: OK
            labels:
              severity: critical
            annotations:
              summary: "최근 5분 내 prod neki-prod 파드에서 ERROR 로그가 감지됨"
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: loki
                model:
                  datasource:
                    type: loki
                    uid: loki
                  expr: 'sum by (pod) (count_over_time({namespace="prod", level="ERROR"}[5m]))'
                  queryType: instant
                  refId: A
              - refId: B
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 300
                  to: 0
                model:
                  datasource:
                    type: __expr__
                    uid: __expr__
                  type: reduce
                  reducer: last
                  expression: A
                  refId: B
              - refId: C
                datasourceUid: __expr__
                model:
                  datasource:
                    type: __expr__
                    uid: __expr__
                  type: threshold
                  expression: B
                  refId: C
                  conditions:
                    - evaluator:
                        type: gt
                        params: [0]
---
# Grafana Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: prod
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.1.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin123"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            # Discord 웹훅 URL (Secret으로 별도 관리, provisioning 파일에서 ${DISCORD_WEBHOOK_URL}로 참조)
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: grafana-discord-webhook
                  key: url
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-alerting
              mountPath: /etc/grafana/provisioning/alerting
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: grafana-storage
              mountPath: /var/lib/grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: grafana-alerting
          configMap:
            name: grafana-alerting
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards
        - name: grafana-storage
          emptyDir: {}
---
# Grafana Service
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: prod
  labels:
    app: grafana
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: grafana
---
# ============================================
# Loki - 로그 저장소
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: prod
data:
  loki.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2020-10-24
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h
    limits_config:
      retention_period: 168h
    query_range:
      align_queries_with_step: true
      max_retries: 5
      cache_results: true
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 100
    compactor:
      working_directory: /loki/compactor
      shared_store: filesystem
      retention_enabled: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: prod
  labels:
    app: loki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:2.9.0
          args:
            - "-config.file=/etc/loki/loki.yaml"
          ports:
            - containerPort: 3100
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          volumeMounts:
            - name: loki-config
              mountPath: /etc/loki
            - name: loki-storage
              mountPath: /loki
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: loki-config
          configMap:
            name: loki-config
        - name: loki-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: loki-service
  namespace: prod
  labels:
    app: loki
spec:
  type: ClusterIP
  ports:
    - port: 3100
      targetPort: 3100
      protocol: TCP
      name: http
  selector:
    app: loki
---
# ============================================
# Promtail - 로그 수집기 (DaemonSet)
# ============================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail-prod
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail-prod
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: prod
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: prod
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
    positions:
      filename: /tmp/positions.yaml
    clients:
      - url: http://loki-service:3100/loki/api/v1/push
        batchwait: 10ms
        batchsize: 102400
    scrape_configs:
      # neki-prod 로그 직접 수집 (static)
      - job_name: neki-prod-logs
        static_configs:
          - targets:
              - localhost
            labels:
              job: neki-prod
              app: neki-prod
              namespace: prod
              __path__: /var/log/pods/prod_neki-prod-*/*/*.log
        pipeline_stages:
          # 컨테이너 로그 JSON 래퍼 파싱 (CRI 형식)
          - cri: {}
          # 로그 레벨 추출
          - regex:
              expression: '^(?P<level>INFO|WARN|ERROR|DEBUG)\s+'
          - labels:
              level:
          # 파드 이름 추출 (경로에서)
          - regex:
              source: filename
              expression: 'prod_(?P<pod>neki-prod-[^_]+)_'
          - labels:
              pod:
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: prod
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: grafana/promtail:2.9.0
          args:
            - "-config.file=/etc/promtail/promtail.yaml"
          ports:
            - containerPort: 9080
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          volumeMounts:
            - name: promtail-config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
      volumes:
        - name: promtail-config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: varlogpods
          hostPath:
            path: /var/log/pods
