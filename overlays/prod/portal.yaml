apiVersion: v1
kind: ConfigMap
metadata:
  name: portal-html
  namespace: prod
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="ko">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Neki Portal</title>
      <style>
        :root { color-scheme: light dark; }
        * { box-sizing: border-box; }
        body {
          margin: 0;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
          background: #f4f5f7;
          color: #1a1a1a;
        }
        @media (prefers-color-scheme: dark) {
          body { background: #16181d; color: #e7e9ee; }
          .card { background: #21242c; box-shadow: 0 8px 30px rgba(0,0,0,.4); }
          tr { border-color: #30343e; }
          a { color: #7db3ff; }
          .desc { color: #9aa0ac; }
        }
        .card {
          width: 100%;
          max-width: 520px;
          margin: 24px;
          padding: 32px;
          background: #fff;
          border-radius: 16px;
          box-shadow: 0 8px 30px rgba(0,0,0,.08);
        }
        h1 { margin: 0 0 4px; font-size: 22px; }
        .desc { margin: 0 0 24px; color: #6b7280; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; }
        th {
          text-align: left; font-size: 12px; text-transform: uppercase;
          letter-spacing: .04em; color: #9aa0ac; padding: 0 8px 10px;
        }
        tr { border-top: 1px solid #eceef1; }
        td { padding: 14px 8px; font-size: 15px; }
        td.name { font-weight: 600; white-space: nowrap; }
        a { color: #2563eb; text-decoration: none; word-break: break-all; }
        a:hover { text-decoration: underline; }
      </style>
    </head>
    <body>
      <main class="card">
        <h1>Neki Portal</h1>
        <p class="desc">서비스 바로가기</p>
        <table>
          <thead>
            <tr><th>이름</th><th>이동</th></tr>
          </thead>
          <tbody>
            <tr>
              <td class="name">어드민</td>
              <td><a href="https://admin.suitestudy.com">admin.suitestudy.com</a></td>
            </tr>
            <tr>
              <td class="name">스프린트 / 위키</td>
              <td><a href="https://sprint.suitestudy.com">sprint.suitestudy.com</a></td>
            </tr>
            <tr>
              <td class="name">깃허브</td>
              <td><a href="https://github.com/Team-Neki" target="_blank" rel="noopener">github.com/Team-Neki</a></td>
            </tr>
          </tbody>
        </table>
      </main>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: prod
  labels:
    app: portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      automountServiceAccountToken: false
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
              # stock nginx는 master가 root로 실행됨 → ALL 드롭 시 아래 최소 권한이 없으면 기동 실패
              add:
                - NET_BIND_SERVICE  # 포트 80(<1024) 바인딩
                - SETUID            # worker 프로세스를 nginx 유저로 강등
                - SETGID
                - CHOWN             # 캐시/로그 디렉토리 소유권 변경
          ports:
            - containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
      volumes:
        - name: html
          configMap:
            name: portal-html
---
apiVersion: v1
kind: Service
metadata:
  name: portal-service
  namespace: prod
  labels:
    app: portal
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: portal
