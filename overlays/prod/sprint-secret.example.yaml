# Sprint 앱 Secret 예시 파일 (문서용, 실제 값 없음)
#
# 사용법:
#   1) 이 파일을 sprint-secret.yaml 로 복사
#   2) 실제 값 채우기
#   3) kubectl apply -f overlays/prod/sprint-secret.yaml
#
# sprint-secret.yaml 은 .gitignore(**/sprint-secret.yaml)에 등록되어 커밋되지 않음.
# 그래도 민감 정보는 절대 커밋 금지.
apiVersion: v1
kind: Secret
metadata:
  name: sprint-secret
  namespace: prod
type: Opaque
stringData:
  # 기존 운영 중인 PostgreSQL 연결 문자열
  DATABASE_URL: "postgresql://USER:PASSWORD@postgres-host:5432/sprint?schema=public"
  # openssl rand -base64 32
  AUTH_SECRET: "REPLACE_WITH_RANDOM_SECRET"
  # Google Cloud Console → APIs & Services → Credentials → OAuth 2.0 Client ID
  GOOGLE_CLIENT_ID: "REPLACE.apps.googleusercontent.com"
  GOOGLE_CLIENT_SECRET: "REPLACE"
