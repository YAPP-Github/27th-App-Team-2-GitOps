apiVersion: v1
kind: ConfigMap
metadata:
  name: sprint-config
  namespace: prod
data:
  # Auth.js(NextAuth v5)가 OAuth 콜백 URL을 만들 때 쓰는 공개 base URL.
  # 브라우저가 실제로 접속하는 주소와 정확히 일치해야 함.
  # ingress(websecure)는 항상 4641 포트로 노출되므로 :4641 포함.
  # Google OAuth 콘솔의 "Authorized redirect URI"도 동일하게 등록해야 함:
  #   https://sprint.suitestudy.com:4641/api/auth/callback/google
  AUTH_URL: "https://sprint.suitestudy.com:4641"
  AUTH_TRUST_HOST: "true"
  # Google 로그인을 특정 Workspace 도메인으로 제한. 비우면 모든 Google 계정 허용.
  # 팀원 계정 도메인에 맞게 설정(예: musinsa.com). 잘못 지정하면 로그인이 막히므로 확인 필요.
  ALLOWED_EMAIL_DOMAIN: ""
  NODE_ENV: "production"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sprint
  namespace: prod
  labels:
    app: sprint
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sprint
  template:
    metadata:
      labels:
        app: sprint
    spec:
      # k8s API 접근 불필요 → SA 토큰 자동 마운트 비활성화
      automountServiceAccountToken: false
      # 앱 시작 전 대기 중인 Prisma 마이그레이션 적용.
      # Prisma가 advisory lock을 잡으므로 롤아웃 중 동시 파드도 안전.
      initContainers:
        - name: migrate
          # ⚠️ 실제 이미지/태그로 교체 필요. Sprint repo CI가 이 태그를 bump 해야 함.
          image: zxz4641/sprint-prod:latest
          imagePullPolicy: Always
          command: ["node", "node_modules/prisma/build/index.js", "migrate", "deploy"]
          envFrom:
            - secretRef:
                name: sprint-secret
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: sprint
          # ⚠️ 실제 이미지/태그로 교체 필요. Sprint repo CI가 이 태그를 bump 해야 함.
          image: zxz4641/sprint-prod:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: sprint-config
            - secretRef:
                name: sprint-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # Next.js standalone 이미지는 USER nextjs(uid 1001) · 포트 3000(>1024)이므로
          # runAsNonRoot + drop ALL을 안전하게 적용 가능 (특권 포트 바인딩 불필요).
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: sprint-service
  namespace: prod
  labels:
    app: sprint
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: sprint
