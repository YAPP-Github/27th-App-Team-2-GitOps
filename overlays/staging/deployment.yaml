apiVersion: apps/v1
kind: Deployment
metadata:
  name: yapp-app-staging
  namespace: staging
  labels:
    app: yapp-app-staging
spec:
  replicas: 1
  # Rolling Update 전략 설정 - 다운타임 제로
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # 동시에 생성할 수 있는 추가 파드 수
      maxUnavailable: 0  # 업데이트 중 사용 불가능한 파드 수 (0 = 다운타임 없음)
  selector:
    matchLabels:
      app: yapp-app-staging
  template:
    metadata:
      labels:
        app: yapp-app-staging
    spec:
      containers:
      - name: yapp-app-staging
        image: zxz4641/yapp-dev:1.0.0-05f50fd
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: TZ
          value: "Asia/Seoul"
        - name: SPRING_PROFILES_ACTIVE
          value: "staging"
        - name: JASYPT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: yapp-secrets
              key: jasypt-password
        # 리소스 제한 설정
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        # Startup Probe - 애플리케이션이 시작되었는지 확인 (느린 시작 대비)
        # startupProbe가 성공하기 전까지 readinessProbe와 livenessProbe는 실행되지 않음
        startupProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 5  # 시작 후 5초 뒤부터 체크 (Spring Boot 초기화 대기)
          periodSeconds: 5         # 5초마다 체크
          timeoutSeconds: 3        # 3초 타임아웃
          successThreshold: 1      # 1번 성공하면 시작 완료
          failureThreshold: 12     # 12번 실패(60초)하면 재시작
        # Readiness Probe - 트래픽을 받을 준비가 되었는지 확인
        # startupProbe 성공 후 바로 실행됨
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 0   # startupProbe 성공 후 즉시 체크 시작
          periodSeconds: 5         # 5초마다 체크
          timeoutSeconds: 3        # 3초 타임아웃
          successThreshold: 1      # 1번 성공하면 트래픽 받음
          failureThreshold: 3      # 3번 실패하면 트래픽 차단
        # Liveness Probe - 애플리케이션이 살아있는지 확인
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 0   # startupProbe 성공 후 즉시 체크 시작
          periodSeconds: 10        # 10초마다 체크
          timeoutSeconds: 3        # 3초 타임아웃
          successThreshold: 1      # 1번 성공하면 정상
          failureThreshold: 3      # 3번 실패하면 파드 재시작
        # 종료 시 Graceful Shutdown
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 10"]
      # 파드 종료 시 최대 대기 시간
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: yapp-app-staging-service
  namespace: staging
  labels:
    app: yapp-app-staging
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: yapp-app-staging
